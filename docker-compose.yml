# StoryMoss Server Stack
# v4.5.0 — Linux 服务端一键部署
#
# 使用方法:
#   1. 复制 .env.example 为 .env 并填写配置
#   2. docker-compose up -d
#

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: storymoss-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storymoss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-storymoss}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-storymoss}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./src-server
      dockerfile: Dockerfile
    container_name: storymoss-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-storymoss}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-storymoss}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      WECHAT_CLIENT_ID: ${WECHAT_CLIENT_ID:-}
      WECHAT_CLIENT_SECRET: ${WECHAT_CLIENT_SECRET:-}
      QQ_CLIENT_ID: ${QQ_CLIENT_ID:-}
      QQ_CLIENT_SECRET: ${QQ_CLIENT_SECRET:-}
    ports:
      - "8080:8080"

  web:
    build:
      context: ./src-server-web
      dockerfile: Dockerfile
    container_name: storymoss-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  postgres_data:
