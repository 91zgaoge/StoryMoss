name: Architecture Guard

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  architecture-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run architecture guard
        run: python3 scripts/architecture_guard.py
