name: Build and Test

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  actions: read
  checks: read

jobs:
  # Rust backend checks
  rust-check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Get version from Cargo.toml
        id: get_cargo_version
        shell: bash
        working-directory: src-tauri
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            src-frontend/package.json
            src-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src-frontend
        run: npm ci

      - name: Build frontend
        working-directory: src-frontend
        run: npm run build

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: tauri-v${{ steps.get_cargo_version.outputs.version }}

      - name: Install rustfmt nightly
        run: rustup component add rustfmt --toolchain nightly

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo +nightly fmt -- --check

      # TODO: 修复 471 个已有 Clippy 警告后恢复 -D warnings
      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy

      - name: Check Rust code
        working-directory: src-tauri
        run: cargo check

      - name: Run Rust tests
        if: matrix.os != 'windows-latest'
        working-directory: src-tauri
        # 已知 49 个 V092 数据库迁移基线测试失败（非新回归），不阻塞整体工作流
        continue-on-error: true
        # Windows runner 上 cargo test 频繁超时/挂起，Windows 仅做编译检查；核心测试由 Ubuntu/macOS 覆盖
        run: cargo test --lib

      - name: Check Rust code (Windows fallback)
        if: matrix.os == 'windows-latest'
        working-directory: src-tauri
        run: cargo check

  # Frontend checks
  frontend-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        shell: bash
        working-directory: src-frontend
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            src-frontend/package.json
            src-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src-frontend
        run: npm ci

      - name: Check frontend formatting
        working-directory: src-frontend
        run: npm run format:check

      # TODO: 修复 200+ 个已有 lint 错误后恢复
      # - name: Lint frontend
      #   working-directory: src-frontend
      #   run: npm run lint

      - name: Type check
        working-directory: src-frontend
        run: npm run type-check

      - name: Run frontend unit tests
        working-directory: src-frontend
        run: npm run test:run

      - name: Build frontend
        working-directory: src-frontend
        run: npm run build

  # E2E tests
  # NOTE: 当前 E2E 在 Vite dev server 上运行，缺少真实 Tauri 后端，settings 页 IPC 调用会挂起。
  # 因此 E2E 失败不阻塞整体工作流；单元测试与构建检查才是可靠质量门。
  e2e-check:
    needs: [frontend-check, rust-check]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package.json
            package-lock.json
            src-frontend/package.json
            src-frontend/package-lock.json

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Install frontend dependencies
        working-directory: src-frontend
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload E2E screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: e2e/screenshots/

  # Full Tauri build (matrix build for all platforms)
  tauri-build:
    needs: [rust-check, frontend-check]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux 自动更新需要 AppImage（.sig）；deb 仍供手动安装
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --bundles deb,appimage
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles msi
          # macOS：dmg 供手动安装；createUpdaterArtifacts 会额外产出 .app.tar.gz + .sig
          - os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
    env:
      # 加速 release 编译：增加 codegen-units 减少单编译单元工作量
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 256
      # 禁用 LTO 进一步加速（默认已关闭，显式声明以防万一）
      CARGO_PROFILE_RELEASE_LTO: false
      # Tauri 更新包签名私钥（与 tauri.conf.json plugins.updater.pubkey 配对）
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      # 无私钥口令时留空；若密钥有口令请配置同名 Secret
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            src-frontend/package.json
            src-frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup swap (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show
          free -h

      - name: Install frontend dependencies
        working-directory: src-frontend
        run: npm ci

      - name: Get version from Cargo.toml
        id: get_cargo_version
        shell: bash
        working-directory: src-tauri
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: tauri-v${{ steps.get_cargo_version.outputs.version }}

      # macOS 证书验证调试：在签名构建前验证证书和密码是否匹配
      - name: Verify Apple certificate (macOS debug)
        if: matrix.os == 'macos-latest' && github.event_name != 'pull_request'
        run: |
          echo "::group::Apple Certificate Debug"

          # 解码证书
          echo "$APPLE_CERTIFICATE" | base64 -d > /tmp/certificate.p12 2>/dev/null || {
            echo "❌ Failed to decode APPLE_CERTIFICATE (not valid base64?)"
            exit 1
          }
          echo "Certificate file size: $(stat -f%z /tmp/certificate.p12) bytes"
          echo "Certificate MD5: $(md5 -q /tmp/certificate.p12)"

          # 调试：密码长度（不泄露密码内容）
          PASS_LEN=${#APPLE_CERTIFICATE_PASSWORD}
          echo "APPLE_CERTIFICATE_PASSWORD length: $PASS_LEN chars"
          if [ "$PASS_LEN" -ne 28 ]; then
            echo "⚠️  WARNING: Expected password length is 28, but got $PASS_LEN"
            echo "   This usually means extra spaces/newlines were added in the Secret"
          fi

          # 先用 openssl 验证（更详细的错误信息）
          echo "---"
          echo "Trying openssl pkcs12 verification..."
          openssl pkcs12 -in /tmp/certificate.p12 -info -noout -passin env:APPLE_CERTIFICATE_PASSWORD 2>&1 || {
            echo "❌ openssl verification failed"
          }

          # 再用 security 导入
          echo "---"
          echo "Trying security keychain import..."
          security create-keychain -p "" /tmp/build.keychain 2>/dev/null || true
          security import /tmp/certificate.p12 -k /tmp/build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign 2>&1 || {
            echo "❌ Certificate import failed — MAC verification failed (wrong password?)"
            echo "   Action: Go to GitHub repo → Settings → Secrets → APPLE_CERTIFICATE_PASSWORD"
            echo "   Delete the secret and re-create it with the exact 28-char password"
            exit 1
          }
          echo "✅ Certificate imported successfully"
          security find-identity -v /tmp/build.keychain
          echo "::endgroup::"
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Verify updater signing key present
        # createUpdaterArtifacts=true 时无私钥会构建失败；push/tag 必须有密钥
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty — updater artifacts cannot be signed"
            echo "Action: Settings → Secrets → ensure TAURI_SIGNING_PRIVATE_KEY matches plugins.updater.pubkey"
            exit 1
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY is set (${#TAURI_SIGNING_PRIVATE_KEY} chars)"

      - name: Build Tauri app (PR)
        if: github.event_name == 'pull_request'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # PR 构建跳过 macOS 代码签名（不设置 APPLE_* 环境变量）
          # 避免证书密码错误阻塞 PR CI
          args: ${{ matrix.args }}
          includeUpdaterJson: true

      - name: Upload PR build artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: storymoss-pr-${{ matrix.os }}
          path: |
            src-tauri/target/**/bundle/dmg/*.dmg
            src-tauri/target/**/bundle/deb/*.deb
            src-tauri/target/**/bundle/appimage/*.AppImage
            src-tauri/target/**/bundle/appimage/*.AppImage.sig
            src-tauri/target/**/bundle/msi/*.msi
            src-tauri/target/**/bundle/msi/*.msi.sig
            src-tauri/target/**/bundle/macos/*.app.tar.gz
            src-tauri/target/**/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: ignore

      - name: Get version from package.json
        id: get_version
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        working-directory: src-frontend
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          Write-Output "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build Tauri app and release (nightly)
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS 代码签名（仅 macOS runner 有效）
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS 公证
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v${{ steps.get_version.outputs.version }}-nightly
          releaseName: 'StoryMoss v${{ steps.get_version.outputs.version }} Nightly'
          releaseBody: |
            ## 新增
            - Nightly 自动构建版本

            ## 注意
            - 此版本为自动构建产物，可能包含未测试的改动
            - 建议仅用于测试目的

            构建时间: ${{ github.event.head_commit.timestamp }}
            提交: ${{ github.sha }}
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          updaterJsonKeepUniversal: true

      - name: Upload nightly build artifacts
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: storymoss-nightly-${{ matrix.os }}
          path: |
            src-tauri/target/**/bundle/dmg/*.dmg
            src-tauri/target/**/bundle/deb/*.deb
            src-tauri/target/**/bundle/appimage/*.AppImage
            src-tauri/target/**/bundle/appimage/*.AppImage.sig
            src-tauri/target/**/bundle/msi/*.msi
            src-tauri/target/**/bundle/msi/*.msi.sig
            src-tauri/target/**/bundle/macos/*.app.tar.gz
            src-tauri/target/**/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: ignore

      - name: Build Tauri app and release (stable)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS 代码签名（仅 macOS runner 有效）
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS 公证
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'StoryMoss ${{ github.ref_name }}'
          releaseBody: |
            ## 新增
            - 详见 CHANGELOG.md

            ## 修复
            - 详见 CHANGELOG.md

            ## 注意
            - 升级前建议导出当前工作室配置作为备份

            包含平台安装包与自动更新产物：
            - Windows (.msi + .msi.sig)
            - macOS (.dmg + .app.tar.gz/.sig)
            - Linux (.deb + .AppImage/.sig)
            - 升级清单 latest.json（应用内「检查更新」读取）

            构建时间: ${{ github.event.head_commit.timestamp }}
            提交: ${{ github.sha }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          updaterJsonKeepUniversal: true

      - name: Upload stable build artifacts
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: storymoss-stable-${{ matrix.os }}
          path: |
            src-tauri/target/**/bundle/dmg/*.dmg
            src-tauri/target/**/bundle/deb/*.deb
            src-tauri/target/**/bundle/appimage/*.AppImage
            src-tauri/target/**/bundle/appimage/*.AppImage.sig
            src-tauri/target/**/bundle/msi/*.msi
            src-tauri/target/**/bundle/msi/*.msi.sig
            src-tauri/target/**/bundle/macos/*.app.tar.gz
            src-tauri/target/**/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: ignore

  # tag 发布后确认 GitHub Release 含 latest.json（应用内升级器依赖）
  verify-updater-manifest:
    needs: [tauri-build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Verify latest.json on GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/91zgaoge/StoryMoss/releases/download/${TAG}/latest.json"
          echo "Checking ${URL}"
          for i in $(seq 1 36); do
            if curl -fsSIL "$URL" >/dev/null 2>&1; then
              echo "✅ latest.json present on ${TAG}"
              curl -fsSL "$URL" | python3 -c 'import json,sys; d=json.load(sys.stdin); print("version=", d.get("version")); print("platforms=", sorted((d.get("platforms") or {}).keys()))'
              # 同时确认 /releases/latest 指向本 tag（非 prerelease）
              LATEST=$(gh api repos/91zgaoge/StoryMoss/releases/latest --jq .tag_name)
              echo "GitHub /releases/latest -> ${LATEST}"
              if [ "$LATEST" != "$TAG" ]; then
                echo "::warning::/releases/latest is ${LATEST}, not ${TAG}. Updater endpoint follows GitHub latest."
              fi
              exit 0
            fi
            echo "attempt ${i}/36: not ready yet..."
            sleep 10
          done
          echo "::error::latest.json missing from release ${TAG} after waiting"
          gh release view "$TAG" --json assets --jq '.assets[].name' || true
          exit 1
